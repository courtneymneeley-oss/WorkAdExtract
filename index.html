<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="求人スキャン">
<link rel="manifest" href="manifest.json">
<title>求人スキャン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--text:#f0ede8;--text2:#8a8680;--text3:#5a5652;--accent:#c8f060;--accent-dim:rgba(200,240,96,0.12);--accent-text:#0f0f0f;--danger:#ff6b6b;--danger-dim:rgba(255,107,107,0.1);--radius:14px;--radius-sm:8px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans','Hiragino Sans',sans-serif;font-size:15px;line-height:1.5;overscroll-behavior:none}
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto}
.header{padding:56px 20px 16px;display:flex;align-items:flex-end;justify-content:space-between;flex-shrink:0}
.header-title{font-size:26px;font-weight:300;letter-spacing:-0.5px}
.header-title span{color:var(--accent);font-weight:500}
.header-count{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);background:var(--bg3);padding:4px 10px;border-radius:20px;border:1px solid var(--border)}
.tabs{display:flex;gap:6px;padding:0 20px 16px;flex-shrink:0}
.tab{flex:1;padding:9px;font-size:13px;font-weight:500;font-family:inherit;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all 0.2s}
.tab.active{background:var(--accent);color:var(--accent-text);border-color:var(--accent)}
.content{flex:1;overflow-y:auto;padding:0 20px 40px;-webkit-overflow-scrolling:touch}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.extract-btn{width:100%;padding:14px;background:var(--accent);color:var(--accent-text);border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;margin-top:10px}
.extract-btn:active{opacity:0.8}
.extract-btn:disabled{opacity:0.5}
.status-bar{min-height:24px;margin-top:8px;font-size:13px;display:flex;align-items:center;gap:6px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.badge-ok{background:var(--accent-dim);color:var(--accent)}
.badge-err{background:var(--danger-dim);color:var(--danger)}
.spinner{width:14px;height:14px;border:1.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.form-section{display:none}
.section-label{font-size:11px;font-weight:500;letter-spacing:0.08em;color:var(--text3);text-transform:uppercase;margin-bottom:10px}
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:14px;padding:10px 12px;transition:border-color 0.2s;appearance:none;-webkit-appearance:none}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent)}
.field input[type=date]{color-scheme:dark}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.contract-grid{display:flex;flex-wrap:wrap;gap:6px}
.contract-pill input{display:none}
.contract-pill label{display:block;padding:8px 14px;border-radius:20px;font-size:15px;font-weight:500;border:1px solid var(--border2);color:var(--text2);cursor:pointer;transition:all 0.15s;user-select:none;-webkit-user-select:none}
.contract-pill input:checked+label{background:var(--accent);color:var(--accent-text);border-color:var(--accent)}
.cat-block{margin-bottom:10px}
.cat-block-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.cat-block-name{font-size:13px;font-weight:500;color:var(--accent)}
.cat-remove{background:transparent;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:0 2px;line-height:1;font-family:inherit}
.cat-block textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:14px;padding:9px 12px;resize:vertical;min-height:64px;line-height:1.6;transition:border-color 0.2s;appearance:none}
.cat-block textarea:focus{outline:none;border-color:var(--accent)}
.add-cat-row{display:flex;gap:8px;margin-top:10px}
.add-cat-row input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:14px;padding:9px 12px;appearance:none}
.add-cat-row input:focus{outline:none;border-color:var(--accent)}
.add-cat-btn{padding:9px 14px;background:transparent;border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text2);font-family:inherit;font-size:13px;cursor:pointer;white-space:nowrap}
.add-cat-btn:active{background:var(--bg3)}
.actions{display:flex;gap:8px;margin-top:14px}
.btn{flex:1;padding:12px;font-size:14px;font-weight:500;font-family:inherit;border-radius:var(--radius-sm);cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);transition:all 0.15s}
.btn:active{opacity:0.7;transform:scale(0.98)}
.btn-save{background:var(--accent);color:var(--accent-text);border-color:var(--accent);flex:2}
.saved-empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:14px}
.saved-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.saved-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.saved-card-title{font-size:15px;font-weight:500;color:var(--text);line-height:1.3}
.saved-card-company{font-size:13px;color:var(--text2);margin-top:2px}
.saved-card-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--border2);color:var(--text2);font-family:'DM Mono',monospace}
.pill-accent{border-color:rgba(200,240,96,0.3);color:var(--accent);background:var(--accent-dim);font-size:13px}
.del-btn{background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text3);font-size:12px;padding:4px 10px;cursor:pointer;font-family:inherit;flex-shrink:0}
.del-btn:active{background:var(--danger-dim);color:var(--danger);border-color:var(--danger)}
.cat-detail{margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.cat-detail-row{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:5px}
.cat-detail-key{color:var(--accent);font-weight:500}
.export-bar{display:none;padding:0 0 16px}
.export-btn{width:100%;padding:13px;background:transparent;border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.export-btn:active{background:var(--bg3)}
.export-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.pane{display:none}
.pane.active{display:block}
.webhook-status{display:inline-flex;align-items:center;gap:5px;font-size:12px;margin-top:6px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-ok{background:var(--accent)}
.dot-none{background:var(--text3)}
.settings-hint{font-size:12px;color:var(--text3);margin-top:6px;line-height:1.5}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-title">Job<span>Scan</span></div>
    <div class="header-count" id="hdr-count">0件</div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('scan',this)">Scan</button>
    <button class="tab" onclick="showTab('saved',this)">Saved</button>
    <button class="tab" onclick="showTab('settings',this)">Settings</button>
  </div>
  <div class="content">
    <div id="pane-scan" class="pane active">
      <div class="card">
        <div class="field" style="margin-bottom:10px">
          <label>Paste ad text here</label>
          <textarea id="paste-input" rows="7" placeholder="Paste copied text here..."></textarea>
        </div>
        <button class="extract-btn" id="extract-btn" onclick="extractFromText()">Organise</button>
      </div>
      <div class="status-bar" id="status"></div>
      <div class="form-section" id="form-section">
        <div class="section-label">Review &amp; edit</div>
        <div class="card">
          <div class="two-col" style="margin-bottom:10px">
            <div class="field" style="margin-bottom:0"><label>会社名</label><input type="text" id="f-company" placeholder="—"></div>
            <div class="field" style="margin-bottom:0"><label>掲載日</label><input type="date" id="f-date"></div>
          </div>
          <div class="field"><label>住所</label><input type="text" id="f-address" placeholder="—"></div>
          <div class="two-col">
            <div class="field"><label>TEL</label><input type="text" id="f-phone" placeholder="—"></div>
            <div class="field"><label>担当者名</label><input type="text" id="f-contact" placeholder="—"></div>
          </div>
          <div class="field" style="margin-bottom:0"><label>担当者 TEL</label><input type="text" id="f-contact-phone" placeholder="—"></div>
        </div>
        <div class="card">
          <div class="field"><label>職種・タイトル</label><input type="text" id="f-title" placeholder="—"></div>
          <div class="field" style="margin-bottom:0">
            <label>雇用形態</label>
            <div class="contract-grid">
              <div class="contract-pill"><input type="radio" name="ct" id="c1" value="正"><label for="c1">正</label></div>
              <div class="contract-pill"><input type="radio" name="ct" id="c2" value="パ"><label for="c2">パ</label></div>
              <div class="contract-pill"><input type="radio" name="ct" id="c3" value="ア"><label for="c3">ア</label></div>
              <div class="contract-pill"><input type="radio" name="ct" id="c4" value="契"><label for="c4">契</label></div>
              <div class="contract-pill"><input type="radio" name="ct" id="c5" value="派"><label for="c5">派</label></div>
              <div class="contract-pill"><input type="radio" name="ct" id="c6" value="業"><label for="c6">業</label></div>
              <div class="contract-pill"><input type="radio" name="ct" id="c7" value="其"><label for="c7">其</label></div>
              <div class="contract-pill"><input type="radio" name="ct" id="c8" value="員"><label for="c8">員</label></div>
              <div class="contract-pill"><input type="radio" name="ct" id="c9" value="その他"><label for="c9">その他</label></div>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="section-label" style="margin-bottom:12px">求人内容</div>
          <div id="cat-blocks"></div>
          <div class="add-cat-row">
            <input type="text" id="new-cat-name" placeholder="カテゴリを追加">
            <button class="add-cat-btn" onclick="addCatBlock()">追加</button>
          </div>
        </div>
        <div class="actions">
          <button class="btn" onclick="resetScan()">Clear</button>
          <button class="btn btn-save" id="save-btn" onclick="saveEntry()">Save &amp; send to Sheet</button>
        </div>
        <div class="status-bar" id="save-status"></div>
      </div>
    </div>
    <div id="pane-saved" class="pane">
      <div class="export-bar" id="export-bar">
        <button class="export-btn" onclick="exportCSV()">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export CSV
        </button>
      </div>
      <div id="saved-list"></div>
    </div>
    <div id="pane-settings" class="pane">
      <div class="card">
        <div class="section-label" style="margin-bottom:12px">Google Sheets webhook</div>
        <div class="field">
          <label>Webhook URL</label>
          <input type="text" id="webhook-url" placeholder="https://script.google.com/macros/s/..." oninput="saveWebhook()">
        </div>
        <div id="webhook-indicator"></div>
        <div class="settings-hint">Paste your Apps Script web app URL here.</div>
      </div>
    </div>
  </div>
</div>
<script>
const STORAGE_KEY='jobscan_v2';
const WEBHOOK_KEY='jobscan_webhook';
let entries=[];

function load(){
  try{entries=JSON.parse(localStorage.getItem(STORAGE_KEY))||[];}catch(e){entries=[];}
  const wh=localStorage.getItem(WEBHOOK_KEY)||'';
  const inp=document.getElementById('webhook-url');
  if(inp)inp.value=wh;
  updateWebhookIndicator(wh);
  updateCount();
  updateSaveBtn();
}

function persist(){localStorage.setItem(STORAGE_KEY,JSON.stringify(entries));updateCount();}

function saveWebhook(){
  const val=document.getElementById('webhook-url').value.trim();
  localStorage.setItem(WEBHOOK_KEY,val);
  updateWebhookIndicator(val);
  updateSaveBtn();
}

function updateWebhookIndicator(url){
  const el=document.getElementById('webhook-indicator');
  if(!el)return;
  if(url&&url.startsWith('https://script.google.com')){
    el.innerHTML='<div class="webhook-status"><span class="dot dot-ok"></span><span style="color:var(--accent)">Webhook connected</span></div>';
  }else if(url){
    el.innerHTML='<div class="webhook-status"><span class="dot" style="background:var(--danger)"></span><span style="color:var(--danger)">URL does not look right</span></div>';
  }else{
    el.innerHTML='<div class="webhook-status"><span class="dot dot-none"></span><span style="color:var(--text3)">No webhook set</span></div>';
  }
}

function updateSaveBtn(){
  const btn=document.getElementById('save-btn');
  if(!btn)return;
  const wh=localStorage.getItem(WEBHOOK_KEY)||'';
  btn.textContent=wh?'Save & send to Sheet':'Save locally';
}

function updateCount(){document.getElementById('hdr-count').textContent=entries.length+'件';}

async function extractFromText(){
  const text=document.getElementById('paste-input').value.trim();
  if(!text){document.getElementById('status').innerHTML='<span class="badge badge-err">Paste some text first</span>';return;}
  const webhook=localStorage.getItem(WEBHOOK_KEY)||'';
  if(!webhook){document.getElementById('status').innerHTML='<span class="badge badge-err">Add your webhook URL in Settings first</span>';return;}
  const btn=document.getElementById('extract-btn');
  const status=document.getElementById('status');
  btn.disabled=true;btn.textContent='Organising...';
  status.innerHTML='<div class="spinner"></div><span style="color:var(--text2);font-size:13px">Reading ad...</span>';
  try{
    const res=await fetch(webhook,{method:'POST',body:JSON.stringify({action:'organise',text:text})});
    const data=await res.json();
    if(data.status==='error')throw new Error(data.message);
    const p=data.result;
    document.getElementById('f-company').value=p.company||'';
    document.getElementById('f-address').value=p.address||'';
    document.getElementById('f-phone').value=p.company_phone||'';
    document.getElementById('f-contact').value=p.contact_person||'';
    document.getElementById('f-contact-phone').value=p.contact_phone||'';
    document.getElementById('f-title').value=p.job_title||'';
    document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
    document.querySelectorAll('input[name="ct"]').forEach(r=>r.checked=false);
    if(p.contract_type){const m=document.querySelector('input[name="ct"][value="'+p.contract_type+'"]');if(m)m.checked=true;}
    renderCatBlocks(p.categories||[]);
    document.getElementById('form-section').style.display='block';
    updateSaveBtn();
    status.innerHTML='<span class="badge badge-ok">Done — review below</span>';
  }catch(err){
    const msg=err&&err.message?err.message:String(err);
    status.innerHTML='<span class="badge badge-err">Failed: '+msg.slice(0,80)+'</span>';
  }
  btn.disabled=false;btn.textContent='Organise';
}

function renderCatBlocks(cats){
  const c=document.getElementById('cat-blocks');c.innerHTML='';
  cats.forEach((cat,i)=>c.appendChild(makeCatBlock(cat.name,cat.content,i)));
}

function makeCatBlock(name,content,idx){
  const id='cb_'+Date.now()+'_'+(idx||0);
  const d=document.createElement('div');
  d.className='cat-block';d.dataset.catname=name;
  d.innerHTML='<div class="cat-block-header"><div class="cat-block-name">'+esc(name)+'</div><button class="cat-remove" onclick="this.closest(\'.cat-block\').remove()">×</button></div><textarea id="'+id+'" placeholder="内容">'+esc(content||'')+'</textarea>';
  return d;
}

function addCatBlock(){
  const inp=document.getElementById('new-cat-name');
  let name=inp.value.trim();if(!name)return;
  if(!name.startsWith('【'))name='【'+name;
  if(!name.endsWith('】'))name=name+'】';
  document.getElementById('cat-blocks').appendChild(makeCatBlock(name,'',Date.now()));
  inp.value='';
}

function getCats(){
  return Array.from(document.querySelectorAll('#cat-blocks .cat-block')).map(b=>({name:b.dataset.catname,content:b.querySelector('textarea').value.trim()}));
}

function getContract(){const c=document.querySelector('input[name="ct"]:checked');return c?c.value:'';}

async function saveEntry(){
  const entry={
    id:Date.now(),
    company:document.getElementById('f-company').value.trim(),
    address:document.getElementById('f-address').value.trim(),
    phone:document.getElementById('f-phone').value.trim(),
    contact:document.getElementById('f-contact').value.trim(),
    contact_phone:document.getElementById('f-contact-phone').value.trim(),
    contract:getContract(),
    title:document.getElementById('f-title').value.trim(),
    date:document.getElementById('f-date').value,
    categories:getCats()
  };
  if(!entry.company&&!entry.title){document.getElementById('save-status').innerHTML='<span class="badge badge-err">Add a company name or job title first</span>';return;}
  const saveStatus=document.getElementById('save-status');
  const webhook=localStorage.getItem(WEBHOOK_KEY)||'';
  entries.unshift(entry);persist();
  if(webhook){
    saveStatus.innerHTML='<div class="spinner"></div><span style="color:var(--text2);font-size:13px">Sending to Google Sheets...</span>';
    try{
      await fetch(webhook,{method:'POST',mode:'no-cors',body:JSON.stringify({action:'save',entry:entry})});
      saveStatus.innerHTML='<span class="badge badge-ok">Saved &amp; sent to Google Sheets</span>';
    }catch(err){
      saveStatus.innerHTML='<span class="badge badge-err">Saved locally — sheet send failed</span>';
    }
  }else{
    saveStatus.innerHTML='<span class="badge badge-ok">Saved locally</span>';
  }
  setTimeout(()=>{saveStatus.innerHTML='';resetScan();},2000);
}

function resetScan(){
  document.getElementById('paste-input').value='';
  document.getElementById('extract-btn').textContent='Organise';
  document.getElementById('status').innerHTML='';
  document.getElementById('form-section').style.display='none';
  document.getElementById('save-status').innerHTML='';
  ['f-company','f-address','f-phone','f-contact','f-contact-phone','f-title','f-date'].forEach(id=>document.getElementById(id).value='');
  document.querySelectorAll('input[name="ct"]').forEach(r=>r.checked=false);
  document.getElementById('cat-blocks').innerHTML='';
  document.getElementById('new-cat-name').value='';
}

function deleteEntry(id){if(!confirm('Delete this entry?'))return;entries=entries.filter(e=>e.id!==id);persist();renderSaved();}

function renderSaved(){
  const list=document.getElementById('saved-list');
  document.getElementById('export-bar').style.display=entries.length>0?'block':'none';
  if(entries.length===0){list.innerHTML='<div class="saved-empty">No entries saved yet</div>';return;}
  list.innerHTML=entries.map(e=>{
    const catHtml=(e.categories||[]).map(c=>'<div class="cat-detail-row"><span class="cat-detail-key">'+esc(c.name)+'</span> '+esc(c.content)+'</div>').join('');
    return '<div class="saved-card"><div class="saved-card-top"><div><div class="saved-card-title">'+esc(e.title||'（タイトルなし）')+'</div><div class="saved-card-company">'+esc(e.company||'（会社名なし）')+'</div></div><button class="del-btn" onclick="deleteEntry('+e.id+')">Delete</button></div>'+(e.address?'<div style="font-size:13px;color:var(--text2);margin-bottom:4px">'+esc(e.address)+'</div>':'')+'<div class="saved-card-meta">'+(e.contract?'<span class="pill pill-accent">'+esc(e.contract)+'</span>':'')+(e.date?'<span class="pill">'+e.date+'</span>':'')+(e.phone?'<span class="pill">'+esc(e.phone)+'</span>':'')+(e.contact?'<span class="pill">担当: '+esc(e.contact)+'</span>':'')+'</div>'+(catHtml?'<div class="cat-detail">'+catHtml+'</div>':'')+'</div>';
  }).join('');
}

function exportCSV(){
  const base=['会社名','住所','TEL','職種・タイトル','雇用形態','求人内容','掲載日'];
  const rows=entries.map(e=>{
    const tel=[e.phone,e.contact?'担当: '+e.contact:'',e.contact_phone].filter(Boolean).join('\n');
    const content=(e.categories||[]).map(c=>c.name+'\n'+c.content).join('\n\n');
    return [e.company,e.address,tel,e.title,e.contract,content,e.date].map(v=>'"'+(v||'').replace(/"/g,'""')+'"');
  });
  const csv=[base.map(h=>'"'+h+'"').join(','),...rows.map(r=>r.join(','))].join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='求人リスト_'+new Date().toISOString().split('T')[0]+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function showTab(tab,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pane-'+tab).classList.add('active');
  if(tab==='saved')renderSaved();
  if(tab==='settings'){const wh=localStorage.getItem(WEBHOOK_KEY)||'';document.getElementById('webhook-url').value=wh;updateWebhookIndicator(wh);}
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

load();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');
</script>
</body>
